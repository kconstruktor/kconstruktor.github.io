<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Wysyłka — Magazyn</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2e2e2e;
  --accent: #ff6b00;
  --accent-dim: rgba(255,107,0,0.15);
  --text: #f0f0f0;
  --text-dim: #888;
  --success: #2ecc71;
  --error: #e74c3c;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100dvh; display:flex; flex-direction:column; overflow-x:hidden; }

/* HEADER */
header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 12px; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:100; }
.logo { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--accent); }
.date-badge { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); background:var(--surface2); padding:4px 10px; border-radius:20px; border:1px solid var(--border); }
.settings-btn { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:20px; padding:4px; }

/* MAIN */
main { flex:1; padding:16px; display:flex; flex-direction:column; gap:14px; }

/* COUNTER */
.counter-bar { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; }
.counter-num { font-family:'Bebas Neue',sans-serif; font-size:42px; color:var(--accent); line-height:1; }
.counter-info { display:flex; flex-direction:column; gap:2px; }
.counter-label { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
.counter-date { font-family:'DM Mono',monospace; font-size:12px; color:var(--text); }

/* CARD */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
.card-title { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); margin-bottom:14px; }

/* INPUTS */
.field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
.field:last-child { margin-bottom:0; }
.field label { font-size:12px; color:var(--text-dim); font-weight:500; text-transform:uppercase; letter-spacing:0.8px; }
.field input { background:var(--surface2); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Mono',monospace; font-size:16px; padding:12px 14px; outline:none; transition:border-color 0.2s; -webkit-appearance:none; }
.field input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
.field input::placeholder { color:#444; font-family:'DM Sans',sans-serif; font-size:15px; }

/* PHOTO GALLERY */
.photo-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:10px; }
.photo-thumb-wrap { position:relative; aspect-ratio:1; border-radius:8px; overflow:hidden; background:var(--surface2); border:1.5px solid var(--border); }
.photo-thumb-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.photo-remove { position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.7); border:none; color:#fff; border-radius:50%; width:24px; height:24px; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
.photo-num { position:absolute; bottom:4px; left:4px; background:rgba(0,0,0,0.7); color:#fff; font-family:'DM Mono',monospace; font-size:10px; padding:2px 5px; border-radius:4px; }

/* ADD PHOTO BUTTON */
.btn-add-photo { width:100%; display:flex; align-items:center; justify-content:center; gap:10px; background:var(--surface2); border:2px dashed var(--border); border-radius:10px; color:var(--text); font-weight:600; font-size:15px; padding:16px; cursor:pointer; transition:all 0.15s; }
.btn-add-photo:active { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
.btn-add-photo.disabled { opacity:0.4; pointer-events:none; }
.add-icon { font-size:22px; }
.photo-count-badge { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); text-align:center; margin-top:6px; }
.photo-count-badge span { color:var(--accent); font-weight:700; }

/* SUBMIT */
.btn-submit { width:100%; background:var(--accent); border:none; border-radius:var(--radius); color:#fff; font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; padding:18px; cursor:pointer; transition:all 0.2s; }
.btn-submit:not(:disabled):active { transform:scale(0.97); background:#e05a00; }
.btn-submit:disabled { background:var(--surface2); color:var(--text-dim); cursor:not-allowed; }

/* HISTORY */
.history-list { display:flex; flex-direction:column; gap:8px; }
.history-item { display:flex; align-items:center; gap:12px; padding:10px 12px; background:var(--surface2); border-radius:8px; border:1px solid var(--border); }
.history-thumbs { display:flex; gap:3px; flex-shrink:0; }
.history-thumb { width:36px; height:36px; border-radius:5px; object-fit:cover; border:1px solid var(--border); }
.history-thumb-more { width:36px; height:36px; border-radius:5px; background:var(--border); display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); }
.history-info { flex:1; min-width:0; }
.history-wz { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.history-meta { font-size:11px; color:var(--text-dim); }
.history-time { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-dim); flex-shrink:0; }
.history-status { font-size:18px; flex-shrink:0; }
.empty-history { text-align:center; color:var(--text-dim); font-size:13px; padding:20px 0; }

/* TOAST */
.toast { position:fixed; bottom:24px; left:16px; right:16px; padding:14px 18px; border-radius:var(--radius); font-weight:600; font-size:15px; display:flex; align-items:center; gap:10px; z-index:999; transform:translateY(100px); opacity:0; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events:none; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { background:var(--success); color:#fff; }
.toast.error { background:var(--error); color:#fff; }

/* SETTINGS MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; align-items:flex-end; backdrop-filter:blur(4px); }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border-radius:20px 20px 0 0; padding:24px 20px 40px; width:100%; border-top:1px solid var(--border); transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.34,1.1,0.64,1); }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
.modal-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1.5px; margin-bottom:20px; color:var(--accent); }
.modal-field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.modal-field label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); }
.modal-field input { background:var(--surface2); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Mono',monospace; font-size:13px; padding:12px 14px; outline:none; }
.modal-field input:focus { border-color:var(--accent); }
.btn-save { width:100%; background:var(--accent); border:none; border-radius:10px; color:#fff; font-weight:700; font-size:16px; padding:14px; margin-top:8px; cursor:pointer; }

/* PROGRESS BAR */
.progress-wrap { display:none; flex-direction:column; gap:6px; }
.progress-wrap.visible { display:flex; }
.progress-bar-bg { background:var(--surface2); border-radius:4px; height:6px; overflow:hidden; }
.progress-bar-fill { background:var(--accent); height:100%; border-radius:4px; transition:width 0.3s; width:0%; }
.progress-label { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); text-align:center; }
</style>
</head>
<body>

<header>
  <div class="logo">WYSYŁKA</div>
  <div class="date-badge" id="header-date">—</div>
  <button class="settings-btn" onclick="openSettings()">⚙</button>
</header>

<main>

  <div class="counter-bar">
    <div class="counter-num" id="today-count">0</div>
    <div class="counter-info">
      <div class="counter-label">Wysyłki dziś</div>
      <div class="counter-date" id="counter-date">—</div>
    </div>
  </div>

  <!-- FORM -->
  <div class="card">
    <div class="card-title">Nowa wysyłka</div>
    <div class="field">
      <label>Numer WZ / Faktury</label>
      <input type="text" id="wz-number" placeholder="np. WZ/2025/001" autocomplete="off" autocapitalize="characters" oninput="checkCanSubmit()">
    </div>
    <div class="field">
      <label>Nazwa firmy (klient)</label>
      <input type="text" id="company-name" placeholder="Nazwa klienta" autocomplete="off" oninput="checkCanSubmit()">
    </div>
  </div>

  <!-- ZDJĘCIA -->
  <div class="card">
    <div class="card-title">Zdjęcia przesyłki</div>

    <!-- GALERIA MINIATUREK -->
    <div class="photo-grid" id="photo-grid"></div>

    <!-- PRZYCISK DODAJ -->
    <button class="btn-add-photo" id="btn-add-photo" onclick="triggerCamera()">
      <span class="add-icon">📷</span>
      <span id="add-photo-label">Zrób zdjęcie</span>
    </button>
    <div class="photo-count-badge" id="photo-count-badge" style="display:none">
      Dodano: <span id="photo-count">0</span> / 8 zdjęć
    </div>

    <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handlePhotoCapture(event)" style="display:none">
  </div>

  <!-- POSTĘP WYSYŁANIA -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <div class="progress-label" id="progress-label">Wysyłanie zdjęcia 1 z 3...</div>
  </div>

  <button class="btn-submit" id="submit-btn" onclick="submitEntry()" disabled>
    WYŚLIJ I ZAPISZ
  </button>

  <!-- HISTORIA DNIA -->
  <div class="card">
    <div class="card-title">Dzisiaj wysłane</div>
    <div class="history-list" id="history-list">
      <div class="empty-history">Brak wysyłek dzisiaj</div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<!-- SETTINGS -->
<div class="modal-overlay" id="settings-modal" onclick="closeSettingsOnBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">⚙ Ustawienia</div>
    <div class="modal-field">
      <label>Webhook URL (n8n)</label>
      <input type="url" id="webhook-url" placeholder="https://twoj-n8n.pl/webhook/magazyn">
    </div>
    <div class="modal-field">
      <label>Imię i nazwisko pracownika</label>
      <input type="text" id="worker-name" placeholder="np. Jan Kowalski">
    </div>
    <button class="btn-save" onclick="saveSettings()">Zapisz</button>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────
let photos = []; // [{dataUrl, fileName}]
const MAX_PHOTOS = 8;

// ── INIT ───────────────────────────────
function init() {
  updateDateDisplay();
  loadTodayCount();
  renderHistory();
  setInterval(updateDateDisplay, 60000);
}

function updateDateDisplay() {
  const now = new Date();
  document.getElementById('header-date').textContent = now.toLocaleDateString('pl-PL');
  document.getElementById('counter-date').textContent = now.toLocaleDateString('pl-PL', {weekday:'long', day:'numeric', month:'long'});
}

function getTodayKey() { return 'entries_' + new Date().toISOString().split('T')[0]; }
function getTodayEntries() { try { return JSON.parse(localStorage.getItem(getTodayKey()) || '[]'); } catch { return []; } }
function saveTodayEntry(e) {
  const entries = getTodayEntries();
  entries.push(e);
  localStorage.setItem(getTodayKey(), JSON.stringify(entries));
  document.getElementById('today-count').textContent = entries.length;
}
function loadTodayCount() {
  document.getElementById('today-count').textContent = getTodayEntries().length;
}

// ── VALIDATION ─────────────────────────
function checkCanSubmit() {
  const wz = document.getElementById('wz-number').value.trim();
  const co = document.getElementById('company-name').value.trim();
  document.getElementById('submit-btn').disabled = !(wz && co && photos.length > 0);
}

// ── CAMERA ─────────────────────────────
function triggerCamera() {
  if (photos.length >= MAX_PHOTOS) return;
  document.getElementById('camera-input').value = '';
  document.getElementById('camera-input').click();
}

function handlePhotoCapture(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxDim = 1400;
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
      const idx = photos.length + 1;
      const wz = document.getElementById('wz-number').value.trim().replace(/[\/\\:]/g,'_') || 'foto';
      photos.push({ dataUrl, fileName: `foto${idx}_${wz}.jpg` });
      renderGallery();
      checkCanSubmit();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removePhoto(idx) {
  photos.splice(idx, 1);
  renderGallery();
  checkCanSubmit();
}

function renderGallery() {
  const grid = document.getElementById('photo-grid');
  const badge = document.getElementById('photo-count-badge');
  const addBtn = document.getElementById('btn-add-photo');
  const addLabel = document.getElementById('add-photo-label');

  grid.innerHTML = photos.map((p, i) => `
    <div class="photo-thumb-wrap">
      <img src="${p.dataUrl}" alt="Zdjęcie ${i+1}">
      <button class="photo-remove" onclick="removePhoto(${i})">✕</button>
      <div class="photo-num">${i+1}</div>
    </div>
  `).join('');

  if (photos.length > 0) {
    badge.style.display = 'block';
    document.getElementById('photo-count').textContent = photos.length;
  } else {
    badge.style.display = 'none';
  }

  if (photos.length >= MAX_PHOTOS) {
    addBtn.classList.add('disabled');
    addLabel.textContent = 'Maksimum 8 zdjęć';
  } else {
    addBtn.classList.remove('disabled');
    addLabel.textContent = photos.length === 0 ? 'Zrób zdjęcie' : 'Dodaj kolejne zdjęcie';
  }
}

// ── SUBMIT ─────────────────────────────
async function submitEntry() {
  const wz = document.getElementById('wz-number').value.trim();
  const company = document.getElementById('company-name').value.trim();
  const webhookUrl = localStorage.getItem('webhook_url') || '';
  const worker = localStorage.getItem('worker_name') || 'Magazyn';
  if (!wz || !company || photos.length === 0) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'WYSYŁANIE...';

  const timestamp = new Date().toISOString();
  const date = timestamp.split('T')[0];
  const time = new Date().toLocaleTimeString('pl-PL', {hour:'2-digit', minute:'2-digit'});

  // Pokaż pasek postępu
  const progressWrap = document.getElementById('progress-wrap');
  const progressBar = document.getElementById('progress-bar');
  const progressLabel = document.getElementById('progress-label');
  progressWrap.classList.add('visible');

  let success = false;

  if (!webhookUrl) {
    showToast('⚠ Skonfiguruj webhook URL w ustawieniach ⚙', 'error');
  } else {
    try {
      // Wyślij wszystkie zdjęcia w jednym żądaniu
      progressLabel.textContent = `Wysyłanie ${photos.length} zdjęć...`;
      progressBar.style.width = '30%';

      const payload = {
        wz_number: wz,
        company_name: company,
        worker,
        timestamp,
        date,
        time,
        photo_count: photos.length,
        photos: photos.map((p, i) => ({
          index: i + 1,
          fileName: p.fileName,
          image_base64: p.dataUrl
        }))
      };

      progressBar.style.width = '60%';

      const res = await fetch(webhookUrl, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });

      progressBar.style.width = '100%';
      success = res.ok;
    } catch(e) {
      progressBar.style.width = '100%';
    }
  }

  setTimeout(() => progressWrap.classList.remove('visible'), 800);

  const thumbs = photos.slice(0, 3).map(p => p.dataUrl);
  saveTodayEntry({ wz, company, time, thumbs, count: photos.length, status: success ? 'ok' : 'pending' });
  renderHistory();

  if (success) {
    showToast(`✓ Wysłano ${photos.length} zdjęć pomyślnie!`, 'success');
    resetForm();
  } else {
    showToast(`⚠ Błąd połączenia — zapisano lokalnie`, 'error');
  }

  btn.disabled = false;
  btn.textContent = 'WYŚLIJ I ZAPISZ';
  checkCanSubmit();
}

function resetForm() {
  document.getElementById('wz-number').value = '';
  document.getElementById('company-name').value = '';
  photos = [];
  renderGallery();
  checkCanSubmit();
}

// ── HISTORY ────────────────────────────
function renderHistory() {
  const entries = getTodayEntries().slice().reverse();
  const list = document.getElementById('history-list');
  if (!entries.length) { list.innerHTML = '<div class="empty-history">Brak wysyłek dzisiaj</div>'; return; }
  list.innerHTML = entries.map(e => {
    const thumbsHtml = (e.thumbs || (e.thumb ? [e.thumb] : [])).slice(0,2).map(t =>
      `<img class="history-thumb" src="${t}" alt="">`
    ).join('');
    const count = e.count || 1;
    const moreHtml = count > 2 ? `<div class="history-thumb-more">+${count-2}</div>` : '';
    return `
      <div class="history-item">
        <div class="history-thumbs">${thumbsHtml}${moreHtml}</div>
        <div class="history-info">
          <div class="history-wz">${esc(e.wz)}</div>
          <div class="history-meta">${esc(e.company)} · ${count} ${count===1?'zdjęcie':count<5?'zdjęcia':'zdjęć'}</div>
        </div>
        <div class="history-time">${e.time}</div>
        <div class="history-status">${e.status==='ok'?'✅':'⏳'}</div>
      </div>`;
  }).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── TOAST ──────────────────────────────
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type+' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// ── SETTINGS ───────────────────────────
function openSettings() {
  document.getElementById('webhook-url').value = localStorage.getItem('webhook_url') || '';
  document.getElementById('worker-name').value = localStorage.getItem('worker_name') || '';
  document.getElementById('settings-modal').classList.add('open');
}
function saveSettings() {
  localStorage.setItem('webhook_url', document.getElementById('webhook-url').value.trim());
  localStorage.setItem('worker_name', document.getElementById('worker-name').value.trim());
  document.getElementById('settings-modal').classList.remove('open');
  showToast('✓ Ustawienia zapisane', 'success');
}
function closeSettingsOnBg(e) { if (e.target===e.currentTarget) document.getElementById('settings-modal').classList.remove('open'); }

init();
</script>
</body>
</html>
